name: HTML to APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create nexsend com.whitefoxstudios.nexsend NexSend
          cd nexsend
          cordova platform add android
          rm -rf www/*
          cp -r ../* www/ || true
          # كود دمج الأيقونة إذا كانت موجودة باسم icon.png
          if [ -f "../icon.png" ]; then
            cp ../icon.png www/icon.png
            sed -i '/<\/widget>/i \    <icon src="www/icon.png" \/>' config.xml
          fi
          cordova build android --device

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexSend-APK
          path: nexsend/platforms/android/app/build/outputs/apk/debug/app-debug.apk
