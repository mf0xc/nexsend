<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<title>NexSend Pro</title>
<style>
:root {
  --bg-primary: #0a1628;
  --bg-secondary: #0d1b2a;
  --bg-tertiary: #14213d;
  --bg-card: #1b2838;
  --bg-input: #1e3a5f;
  --bg-hover: #243b55;
  --bg-active: #1a3a5c;
  --text-primary: #e0e6ed;
  --text-secondary: #8b9dc3;
  --text-muted: #5c7aea;
  --text-accent: #4fc3f7;
  --border-color: #1e3a5f;
  --border-light: #2a4a6e;
  --primary: #2196f3;
  --primary-hover: #1976d2;
  --primary-glow: rgba(33, 150, 243, 0.3);
  --sent-bubble: #1565c0;
  --sent-bubble-gradient: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
  --received-bubble: #1e3a5f;
  --received-bubble-gradient: linear-gradient(135deg, #243b55 0%, #1e3a5f 100%);
  --success: #4caf50;
  --error: #f44336;
  --warning: #ff9800;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 20px rgba(33, 150, 243, 0.2);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="light"] {
  --bg-primary: #f0f4f8;
  --bg-secondary: #e3eaf3;
  --bg-tertiary: #d6e3f0;
  --bg-card: #ffffff;
  --bg-input: #ffffff;
  --bg-hover: #e8f0fe;
  --bg-active: #d2e3fc;
  --text-primary: #1a237e;
  --text-secondary: #3949ab;
  --text-muted: #5c6bc0;
  --text-accent: #1565c0;
  --border-color: #c5cae9;
  --border-light: #e8eaf6;
  --sent-bubble: #1976d2;
  --sent-bubble-gradient: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
  --received-bubble: #e3f2fd;
  --received-bubble-gradient: linear-gradient(135deg, #f5f5f5 0%, #e3f2fd 100%);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  line-height: 1.5; height: 100vh; overflow: hidden;
  transition: var(--transition);
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary-hover); }

/* AUTH */
.auth-screen {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-primary);
  background-image: radial-gradient(circle at 20% 50%, rgba(33,150,243,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(79,195,247,0.05) 0%, transparent 50%);
}
.auth-container { width: 100%; max-width: 420px; padding: 16px; }
.auth-card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--radius-lg); padding: 40px 32px;
  box-shadow: var(--shadow-glow), var(--shadow-md); backdrop-filter: blur(10px);
}
.auth-logo {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin-bottom: 32px;
}
.auth-logo-icon {
  width: 52px; height: 52px; background: var(--sent-bubble-gradient);
  border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(33,150,243,0.4);
}
.auth-logo-icon svg { width: 28px; height: 28px; color: white; }
.auth-logo h1 { font-size: 28px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
.auth-logo span { color: var(--primary); }
.auth-tabs {
  display: flex; gap: 8px; margin-bottom: 28px;
  background: var(--bg-tertiary); padding: 4px; border-radius: var(--radius-xl);
}
.auth-tab {
  flex: 1; padding: 12px; text-align: center; background: none; border: none;
  color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer;
  border-radius: var(--radius-xl); transition: var(--transition);
}
.auth-tab:hover { color: var(--text-primary); }
.auth-tab.active { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(33,150,243,0.3); }
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-group input {
  width: 100%; padding: 14px 16px; border: 2px solid var(--border-color);
  border-radius: var(--radius-md); font-size: 15px; font-family: inherit;
  background: var(--bg-input); color: var(--text-primary); outline: none;
  transition: var(--transition);
}
.form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.form-group input::placeholder { color: var(--text-muted); opacity: 0.6; }
.btn-primary {
  width: 100%; padding: 14px; background: var(--sent-bubble-gradient); color: white;
  border: none; border-radius: var(--radius-md); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: var(--transition); box-shadow: 0 4px 12px rgba(33,150,243,0.3);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(33,150,243,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.error-msg {
  color: var(--error); font-size: 13px; margin-bottom: 14px; display: none;
  padding: 10px 14px; background: rgba(244,67,54,0.1); border-radius: var(--radius-sm);
  border-right: 3px solid var(--error);
}
.success-msg {
  color: var(--success); font-size: 13px; margin-bottom: 14px; display: none;
  padding: 10px 14px; background: rgba(76,175,80,0.1); border-radius: var(--radius-sm);
  border-right: 3px solid var(--success);
}

/* APP */
.app-screen { display: none; height: 100vh; width: 100vw; }
.app-screen.active { display: flex; }
.app-container { display: flex; height: 100vh; width: 100vw; background: var(--bg-primary); }

/* Sidebar */
.sidebar {
  width: 380px; min-width: 300px; max-width: 420px;
  background: var(--bg-secondary); border-left: 1px solid var(--border-color);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header {
  background: var(--bg-tertiary); padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; border-bottom: 1px solid var(--border-color);
}
.sidebar-header .logo {
  font-size: 22px; font-weight: 800; color: var(--text-primary);
  display: flex; align-items: center; gap: 10px; letter-spacing: -0.5px;
}
.logo-icon {
  width: 36px; height: 36px; background: var(--sent-bubble-gradient);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 20px; height: 20px; color: white; }
.sidebar-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  background: var(--bg-hover); border: none; color: var(--text-secondary);
  cursor: pointer; padding: 10px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition); width: 40px; height: 40px;
}
.icon-btn:hover { background: var(--primary); color: white; transform: scale(1.05); box-shadow: 0 0 12px rgba(33,150,243,0.3); }
.icon-btn:active { transform: scale(0.95); }

.search-bar { padding: 10px 14px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border-color); }
.search-bar-wrapper { position: relative; display: flex; align-items: center; }
.search-bar-wrapper svg { position: absolute; right: 14px; width: 18px; height: 18px; color: var(--text-muted); pointer-events: none; }
.search-bar input {
  width: 100%; padding: 10px 14px 10px 40px; border: 1px solid var(--border-color);
  border-radius: var(--radius-xl); font-size: 14px; font-family: inherit;
  background: var(--bg-input); color: var(--text-primary); outline: none; transition: var(--transition);
}
.search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }
.search-bar input::placeholder { color: var(--text-muted); }

.conversations { flex: 1; overflow-y: auto; padding: 8px; }
.conversation-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; cursor: pointer; transition: var(--transition);
  border-radius: var(--radius-md); margin-bottom: 4px;
  text-decoration: none; color: inherit; position: relative;
}
.conversation-item:hover { background: var(--bg-hover); transform: translateX(-4px); }
.conversation-item.active { background: var(--bg-active); border-right: 3px solid var(--primary); }
.conversation-item .info { flex: 1; min-width: 0; }
.conversation-item .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.conversation-item .name { font-weight: 600; font-size: 15px; color: var(--text-primary); }
.conversation-item .time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; font-weight: 500; }
.conversation-item .preview-row { display: flex; justify-content: space-between; align-items: center; }
.conversation-item .preview {
  font-size: 13px; color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.conversation-item .unread-badge {
  min-width: 20px; height: 20px; border-radius: 10px; background: var(--primary); color: white;
  font-size: 11px; font-weight: 700; display: none; align-items: center; justify-content: center;
  padding: 0 6px; box-shadow: 0 0 8px rgba(33,150,243,0.4);
}

.avatar {
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--sent-bubble-gradient); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; flex-shrink: 0; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 2px solid var(--border-light);
}
.avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
.avatar-sm { width: 44px; height: 44px; font-size: 16px; }
.avatar-xs { width: 32px; height: 32px; font-size: 12px; }
.group-avatar { background: linear-gradient(135deg, #7c4dff 0%, #651fff 100%); }

/* Chat Area */
.chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); position: relative; }
.chat-area::before {
  content: ''; position: absolute; inset: 0; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234fc3f7' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.chat-header {
  padding: 12px 18px; background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; gap: 14px;
  height: 68px; z-index: 1; box-shadow: var(--shadow-sm);
}
.chat-header .chat-info { flex: 1; }
.chat-header .chat-name { font-weight: 700; font-size: 16px; color: var(--text-primary); }
.chat-header .chat-status {
  font-size: 12px; color: var(--text-accent); display: flex; align-items: center; gap: 6px;
}
.chat-header .chat-status::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--success); display: inline-block; box-shadow: 0 0 6px var(--success);
}
.chat-header .chat-status.typing::before {
  background: var(--warning); box-shadow: 0 0 6px var(--warning);
  animation: pulse-dot 1.5s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 4px; z-index: 1;
}
.message-row {
  display: flex; margin-bottom: 4px; position: relative;
  animation: msg-appear 0.3s ease-out;
}
@keyframes msg-appear { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.message-row.sent { justify-content: flex-start; }
.message-row.received { justify-content: flex-end; }
.message-bubble {
  max-width: 70%; padding: 10px 14px; border-radius: 18px;
  font-size: 14.5px; line-height: 1.5; word-break: break-word;
  position: relative; box-shadow: var(--shadow-sm); transition: var(--transition);
}
.message-bubble.sent {
  background: var(--sent-bubble-gradient); color: white; border-top-right-radius: 4px;
}
.message-bubble.received {
  background: var(--received-bubble-gradient); color: var(--text-primary);
  border-top-left-radius: 4px; border: 1px solid var(--border-color);
}
.message-bubble.deleted { opacity: 0.5; font-style: italic; }
.message-bubble:hover { transform: scale(1.01); }
.msg-content { margin-bottom: 4px; }
.message-meta { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 2px; }
.message-time { font-size: 10px; opacity: 0.8; }
.message-check { display: flex; align-items: center; }
.message-check svg { width: 16px; height: 16px; }
.message-check.read svg { color: #4fc3f7; }
.message-edited { font-size: 10px; opacity: 0.7; background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 10px; }
.sender-name { font-size: 11px; color: var(--text-accent); margin-bottom: 2px; font-weight: 600; }

.load-more-btn {
  text-align: center; padding: 10px; color: var(--text-muted); font-size: 12px;
  cursor: pointer; border-radius: var(--radius-md); transition: var(--transition);
}
.load-more-btn:hover { background: var(--bg-hover); color: var(--text-accent); }
.date-divider { text-align: center; margin: 16px 0; position: relative; }
.date-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-color); }
.date-divider span { background: var(--bg-primary); padding: 4px 16px; color: var(--text-muted); font-size: 12px; position: relative; border-radius: 12px; border: 1px solid var(--border-color); }

.chat-input-area {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; background: var(--bg-tertiary);
  border-top: 1px solid var(--border-color); z-index: 1;
}
.chat-input-wrapper { flex: 1; position: relative; display: flex; align-items: center; }
.chat-input-wrapper input {
  width: 100%; padding: 12px 48px 12px 16px; border: 1px solid var(--border-color);
  border-radius: var(--radius-xl); font-size: 15px; font-family: inherit;
  background: var(--bg-input); color: var(--text-primary); outline: none; transition: var(--transition);
}
.chat-input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.chat-input-wrapper input::placeholder { color: var(--text-muted); }
.emoji-btn {
  position: absolute; left: 12px; background: none; border: none;
  color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.emoji-btn:hover { color: var(--primary); background: var(--bg-hover); }
.send-btn {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--sent-bubble-gradient) !important; color: white !important;
  border: none !important; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition); box-shadow: 0 4px 12px rgba(33,150,243,0.3); flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(33,150,243,0.4); }
.send-btn:active { transform: scale(0.95); }

.empty-chat {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-muted); gap: 20px; z-index: 1;
}
.empty-chat-icon {
  width: 100px; height: 100px; background: var(--bg-tertiary);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-glow);
}
.empty-chat-icon svg { width: 50px; height: 50px; color: var(--primary); opacity: 0.6; }
.empty-chat h3 { font-size: 28px; font-weight: 300; color: var(--text-primary); }
.empty-chat p { font-size: 14px; color: var(--text-secondary); }

/* Emoji Picker */
.emoji-picker {
  position: absolute; bottom: 70px; left: 18px; background: var(--bg-card);
  border: 1px solid var(--border-color); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md); padding: 12px; display: none; z-index: 100;
  width: 320px; max-height: 300px; overflow-y: auto;
}
.emoji-picker.active { display: block; }
.emoji-picker-search {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border-color);
  border-radius: var(--radius-md); background: var(--bg-input); color: var(--text-primary);
  margin-bottom: 10px; font-size: 14px;
}
.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
.emoji-item { padding: 6px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 20px; transition: var(--transition); }
.emoji-item:hover { background: var(--bg-hover); transform: scale(1.2); }

/* Context Menu */
.context-menu {
  position: fixed; background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--radius-md); box-shadow: var(--shadow-md); z-index: 1000;
  min-width: 160px; display: none; overflow: hidden;
}
.context-menu.active { display: block; }
.context-menu-item {
  padding: 12px 18px; font-size: 14px; cursor: pointer; color: var(--text-primary);
  display: flex; align-items: center; gap: 10px; transition: var(--transition);
  border: none; background: none; width: 100%; text-align: right; font-family: inherit;
}
.context-menu-item:hover { background: var(--bg-hover); }
.context-menu-item.danger { color: var(--error); }
.context-menu-item.danger:hover { background: rgba(244,67,54,0.1); }

/* Modals */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg);
  padding: 28px; width: 100%; max-width: 480px; color: var(--text-primary);
  max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-glow), var(--shadow-md);
}
.modal h2 { margin-bottom: 20px; font-size: 20px; font-weight: 700; }
.modal input, .modal select {
  width: 100%; padding: 12px 16px; border: 2px solid var(--border-color);
  border-radius: var(--radius-md); font-family: inherit; font-size: 15px; margin-bottom: 14px;
  background: var(--bg-input); color: var(--text-primary); outline: none; transition: var(--transition);
}
.modal input:focus, .modal select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }
.modal-error {
  color: var(--error); font-size: 13px; margin-bottom: 12px; display: none;
  padding: 10px; background: rgba(244,67,54,0.1); border-radius: var(--radius-sm);
}
.btn-secondary {
  padding: 10px 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color);
  background: var(--bg-hover); color: var(--text-primary); cursor: pointer;
  font-weight: 600; font-size: 14px; transition: var(--transition); font-family: inherit;
}
.btn-secondary:hover { background: var(--bg-active); border-color: var(--primary); }

.search-results { margin-top: 10px; max-height: 300px; overflow-y: auto; }
.search-result-item {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  border-radius: var(--radius-md); cursor: pointer; transition: var(--transition);
  border-bottom: 1px solid var(--border-color);
}
.search-result-item:hover { background: var(--bg-hover); transform: translateX(-4px); }
.search-result-item .name { font-weight: 700; font-size: 15px; color: var(--text-primary); }
.search-result-item .handle { font-size: 13px; color: var(--text-muted); }

.member-select { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; margin: 14px 0; }
.member-option {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); border: 1px solid transparent;
}
.member-option:hover { background: var(--bg-hover); border-color: var(--border-color); }
.member-option input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); }

/* Profile Page */
.profile-page {
  position: fixed; inset: 0; z-index: 300; background: var(--bg-primary);
  display: none; flex-direction: column; overflow-y: auto;
}
.profile-page.active { display: flex; }
.profile-header {
  background: var(--bg-tertiary); padding: 40px 24px 24px;
  text-align: center; border-bottom: 1px solid var(--border-color); position: relative;
}
.profile-back-btn {
  position: absolute; top: 16px; right: 16px; background: var(--bg-hover); border: none;
  color: var(--text-secondary); cursor: pointer; padding: 10px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.profile-back-btn:hover { background: var(--primary); color: white; }
.profile-avatar-large {

  color: white; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 36px; margin: 0 auto 16px;

}
.profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
.profile-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.profile-handle { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
.profile-phone { font-size: 13px; color: var(--text-accent); }
.profile-stats {
  display: flex; justify-content: center; gap: 32px;
  padding: 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);
}
.profile-stat { text-align: center; }
.profile-stat-value { font-size: 22px; font-weight: 700; color: var(--primary); }
.profile-stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; }
.profile-section { padding: 20px 24px; border-bottom: 1px solid var(--border-color); }
.profile-section h3 { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.profile-info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
.profile-info-row:last-child { border-bottom: none; }
.profile-info-label { color: var(--text-secondary); font-size: 14px; }
.profile-info-value { color: var(--text-primary); font-weight: 600; font-size: 14px; }

/* Notification Toast */
.notification-toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg);
  padding: 14px 20px; box-shadow: var(--shadow-md); z-index: 1000;
  display: flex; align-items: center; gap: 12px; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  max-width: 90vw;
}
.notification-toast.active { transform: translateX(-50%) translateY(0); }
.notification-content { flex: 1; }
.notification-title { font-weight: 700; font-size: 14px; color: var(--text-primary); }
.notification-body { font-size: 13px; color: var(--text-secondary); }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { width: 100%; max-width: none; border-left: none; }
  .chat-area { display: none; }
  .chat-area.active { display: flex; position: fixed; inset: 0; z-index: 50; }
  .back-btn { display: flex !important; }
  .auth-card { padding: 28px 20px; }
  .emoji-picker { width: 280px; left: 8px; }
}
.back-btn {
  display: none; background: none; border: none; color: var(--text-secondary);
  cursor: pointer; padding: 8px; border-radius: 8px; transition: var(--transition);
}
.back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

.spinner { width: 20px; height: 20px; border: 2px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.typing-dots { display: flex; gap: 4px; padding: 8px 14px; background: var(--received-bubble-gradient); border-radius: 18px; border-top-left-radius: 4px; border: 1px solid var(--border-color); align-self: flex-end; }
.typing-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); animation: typing-bounce 1.4s infinite ease-in-out both; }
.typing-dots span:nth-child(1) { animation-delay: -0.32s; }
.typing-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes typing-bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
</style>
</head>

function formatShortTime(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return 'الآن';
  if (diff < 3600) return Math.floor(diff / 60) + ' د';
  if (diff < 86400) return Math.floor(diff / 3600) + ' س';
  if (diff < 604800) return Math.floor(diff / 86400) + ' ي';
  return date.toLocaleDateString('ar-SA', { month: 'short', day: 'numeric' });

// Load Conversations
async function loadConversations() {
  if (!currentUser) return;
  try {
    const { data: msgs } = await supabase
      .from('messages')
      .select('id, sender_id, receiver_id, content, created_at, read_at')
      .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
      .eq('deleted', false)
      .order('created_at', { ascending: false });
    const partnerMap = new Map();
    for (const msg of msgs || []) {
      const partnerId = msg.sender_id === currentUser.id ? msg.receiver_id : msg.sender_id;
      if (!partnerMap.has(partnerId)) partnerMap.set(partnerId, msg);
    }
    const { data: groupMemberships } = await supabase
      .from('group_members').select('group_id').eq('user_id', currentUser.id);
    const groupIds = (groupMemberships || []).map(g => g.group_id);
    let groupMap = new Map();
    if (groupIds.length > 0) {
      const { data: groups } = await supabase.from('groups').select('id, name, creator_id, created_at').in('id', groupIds);
      const { data: groupMsgs } = await supabase
        .from('group_messages').select('id, group_id, content, created_at')
        .in('group_id', groupIds).eq('deleted', false).order('created_at', { ascending: false });
      for (const g of groups || []) {
        const lastMsg = (groupMsgs || []).find(m => m.group_id === g.id);
        groupMap.set(g.id, { type: 'group', data: g, lastMsg: lastMsg || { content: 'مجموعة جديدة', created_at: g.created_at } });
      }
    }
    const partnerIds = Array.from(partnerMap.keys());
    conversationsList.innerHTML = ''; conversationMap.clear();
    if (partnerIds.length === 0 && groupMap.size === 0) {
      conversationsList.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">لا توجد محادثات بعد</div>';
      return;
    }
    if (partnerIds.length > 0) {
      const { data: profiles } = await supabase.from('profiles').select('id, username, display_name, avatar_url, phone').in('id', partnerIds);
      for (const id of partnerIds) {
        const profile = profiles?.find(p => p.id === id);
        const lastMsg = partnerMap.get(id);
        renderConversation(id, profile, lastMsg, 'direct');
      }
    }
    for (const [groupId, info] of groupMap) {
      renderConversation(groupId, info.data, info.lastMsg, 'group');
    }
  } catch (err) {
    console.error('Load conversations error:', err);
    conversationsList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--error);">فشل تحميل المحادثات</div>';
  }
}

function renderConversation(id, profileOrGroup, lastMsg, type, prepend = false) {
  const isGroup = type === 'group';
  const name = isGroup ? profileOrGroup.name : (profileOrGroup?.display_name || profileOrGroup?.username || 'مستخدم');
  const avatarLetter = name[0].toUpperCase();
  const avatarHtml = !isGroup && profileOrGroup?.avatar_url ? `<img src="${escapeHtml(profileOrGroup.avatar_url)}" alt="">` : escapeHtml(avatarLetter);
  const avatarClass = isGroup ? 'avatar avatar-sm group-avatar' : 'avatar avatar-sm';
  const div = document.createElement('div');
  div.className = 'conversation-item';
  div.dataset.id = id; div.dataset.type = type;
  div.innerHTML = `
    <div class="${avatarClass}">${avatarHtml}</div>
    <div class="info">
      <div class="name-row"><div class="name">${escapeHtml(name)}</div><div class="time" id="time-${type}-${id}">${formatShortTime(lastMsg?.created_at || new Date())}</div></div>
      <div class="preview-row"><div class="preview" id="preview-${type}-${id}">${escapeHtml(lastMsg?.content || '')}</div><div class="unread-badge" id="unread-${type}-${id}">1</div></div>
    </div>`;
  div.addEventListener('click', () => {
    document.getElementById(`unread-${type}-${id}`)?.style.setProperty('display', 'none');
    if (isGroup) openGroupChat(id, profileOrGroup);
    else openChat(id, profileOrGroup);
  });
  if (prepend && conversationsList.firstChild) conversationsList.insertBefore(div, conversationsList.firstChild);
  else conversationsList.appendChild(div);
  conversationMap.set(`${type}-${id}`, { element: div, profile: profileOrGroup, type });
}

function updateConversationPreview(id, type, content, time) {
  const preview = document.getElementById(`preview-${type}-${id}`);
  const timeEl = document.getElementById(`time-${type}-${id}`);
  if (preview) preview.textContent = content;
  if (timeEl) timeEl.textContent = formatShortTime(time);
  const key = `${type}-${id}`;
  const conv = conversationMap.get(key);
  if (conv && conv.element && conversationsList.firstChild !== conv.element) {
    conversationsList.insertBefore(conv.element, conversationsList.firstChild);
  }
  if ((type === 'direct' && id !== currentPartnerId) || (type === 'group' && id !== currentGroupId)) {
    const unread = document.getElementById(`unread-${type}-${id}`);
    if (unread) { unread.style.display = 'flex'; }
  }
}


// Open Direct Chat
async function openChat(partnerId, profile) {
  currentPartnerId = partnerId; currentGroupId = null; currentChatType = 'direct';
  messageOffset = 0; allMessagesLoaded = false; lastDateDivider = null;
  document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.conversation-item[data-id="${partnerId}"][data-type="direct"]`)?.classList.add('active');
  const avatarLetter = (profile?.display_name || profile?.username || 'م')[0].toUpperCase();
  const avatarHtml = profile?.avatar_url ? `<img src="${escapeHtml(profile.avatar_url)}" alt="">` : escapeHtml(avatarLetter);
  chatArea.innerHTML = `
    <div class="chat-header">
      <button class="back-btn" id="back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="avatar avatar-sm">${avatarHtml}</div>
      <div class="chat-info"><div class="chat-name">${escapeHtml(profile?.display_name || profile?.username || 'محادثة')}</div><div class="chat-status" id="chat-status-text">متصل</div></div>
      <div class="sidebar-actions"><button class="icon-btn" id="chat-menu-btn" title="قائمة"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button></div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <button class="icon-btn emoji-btn" id="emoji-btn" title="إيموجي"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
      <div class="chat-input-wrapper"><input type="text" id="message-input" placeholder="اكتب رسالة..." autocomplete="off"></div>
      <button class="send-btn" id="send-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>`;
  document.getElementById('back-btn')?.addEventListener('click', () => { chatArea.classList.remove('active'); currentPartnerId = null; currentChatType = null; });
  if (window.innerWidth <= 768) chatArea.classList.add('active');
  const messagesContainer = document.getElementById('chat-messages');
  await loadMoreMessages(messagesContainer, partnerId, 'direct');
  await markMessagesAsRead(partnerId);
  messagesContainer.addEventListener('scroll', async () => {
    if (messagesContainer.scrollTop < 50 && !isLoadingMore && !allMessagesLoaded) {
      await loadMoreMessages(messagesContainer, partnerId, 'direct', true);
    }
  });
  const sendBtn = document.getElementById('send-btn');
  const input = document.getElementById('message-input');
  const sendMessage = async () => {
    const content = input.value.trim();
    if (!content) return;
    input.value = ''; input.focus();
    const tempId = 'temp-' + Date.now();
    const tempMsg = { id: null, sender_id: currentUser.id, content, created_at: new Date().toISOString(), tempId, read_at: null, edited_at: null, deleted: false };
    renderMessage(tempMsg, messagesContainer);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    try {
      const { data, error } = await supabase.from('messages').insert({ sender_id: currentUser.id, receiver_id: partnerId, content }).select().single();
      if (error) { alert('فشل إرسال الرسالة: ' + classifyError(error).msg); return; }
      const tempEl = document.querySelector(`[data-temp-id="${tempId}"]`);
      if (tempEl) { tempEl.dataset.msgId = data.id; delete tempEl.dataset.tempId; }
      updateConversationPreview(partnerId, 'direct', content, new Date());
    } catch (err) { alert('فشل إرسال الرسالة: ' + classifyError(err).msg); }
  };
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
  input.addEventListener('input', async () => {
    if (typingTimeout) clearTimeout(typingTimeout);
    await supabase.from('typing_indicators').upsert({ user_id: currentUser.id, target_id: partnerId, updated_at: new Date().toISOString() }, { onConflict: 'user_id,target_id,group_id' });
    typingTimeout = setTimeout(() => { supabase.from('typing_indicators').delete().eq('user_id', currentUser.id).eq('target_id', partnerId); }, 3000);
  });
  // Emoji picker
  const emojiBtn = document.getElementById('emoji-btn');
  const emojiPicker = document.getElementById('emoji-picker');
  const emojiGrid = document.getElementById('emoji-grid');
  const emojiSearch = document.getElementById('emoji-search');
  emojiGrid.innerHTML = '';
  EMOJIS.forEach(emoji => {
    const span = document.createElement('span');
    span.className = 'emoji-item'; span.textContent = emoji;
    span.addEventListener('click', () => { input.value += emoji; emojiPicker.classList.remove('active'); input.focus(); });
    emojiGrid.appendChild(span);
  });
  emojiSearch.addEventListener('input', (e) => {
    const q = e.target.value;
    emojiGrid.querySelectorAll('.emoji-item').forEach(el => {
      el.style.display = el.textContent.includes(q) ? 'block' : 'none';
    });
  });
  emojiBtn.addEventListener('click', (e) => { e.stopPropagation(); emojiPicker.classList.toggle('active'); });
  document.addEventListener('click', (e) => { if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) emojiPicker.classList.remove('active'); });
  // Realtime
  if (chatRealtimeChannel) supabase.removeChannel(chatRealtimeChannel);
  chatRealtimeChannel = supabase
    .channel(`chat-${currentUser.id}-${partnerId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
      const msg = payload.new;
      const isRelevant = (msg.sender_id === currentUser.id && msg.receiver_id === partnerId) || (msg.sender_id === partnerId && msg.receiver_id === currentUser.id);
      if (!isRelevant) return;
      if (document.querySelector(`[data-msg-id="${msg.id}"]`)) return;
      renderMessage(msg, messagesContainer);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      if (msg.sender_id === partnerId) {
        updateConversationPreview(partnerId, 'direct', msg.content, msg.created_at);
        markMessagesAsRead(partnerId);
        showNotification(profile?.display_name || profile?.username || 'رسالة جديدة', msg.content, (profile?.display_name || 'م')[0]);
      }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, (payload) => {
      const msg = payload.new;
      const el = document.querySelector(`[data-msg-id="${msg.id}"]`);
      if (el) {
        const contentDiv = el.querySelector('.msg-content');
        if (contentDiv) { contentDiv.textContent = msg.deleted ? 'تم حذف هذه الرسالة' : msg.content; if (msg.deleted) el.classList.add('deleted'); }
        const editedSpan = el.querySelector('.message-edited');
        if (editedSpan && msg.edited_at) editedSpan.style.display = 'inline';
      }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'typing_indicators' }, (payload) => {
      const t = payload.new;
      if (t.target_id === currentUser.id && t.user_id === partnerId && !t.group_id) {
        const statusEl = document.getElementById('chat-status-text');
        if (statusEl) { statusEl.textContent = 'يكتب الآن...'; statusEl.classList.add('typing'); }
        setTimeout(() => { if (statusEl) { statusEl.textContent = 'متصل'; statusEl.classList.remove('typing'); } }, 3000);
      }
    })
    .subscribe();
}

async function loadMoreMessages(container, id, type, prepend = false) {
  if (isLoadingMore) return;
  isLoadingMore = true;
  const loadMoreDiv = document.createElement('div');
  loadMoreDiv.className = 'load-more-btn'; loadMoreDiv.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
  if (prepend) container.insertBefore(loadMoreDiv, container.firstChild);
  else container.appendChild(loadMoreDiv);
  try {
    let data;
    if (type === 'direct') {
      const { data: msgs } = await supabase.from('messages').select('*')
        .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${id}),and(sender_id.eq.${id},receiver_id.eq.${currentUser.id})`)
        .eq('deleted', false).order('created_at', { ascending: false }).range(messageOffset, messageOffset + MESSAGE_LIMIT - 1);
      data = msgs;
    } else {
      const { data: msgs } = await supabase.from('group_messages').select('*')
        .eq('group_id', id).eq('deleted', false).order('created_at', { ascending: false }).range(messageOffset, messageOffset + MESSAGE_LIMIT - 1);
      data = msgs;
    }
    if (!data || data.length < MESSAGE_LIMIT) allMessagesLoaded = true;
    const scrollHeight = container.scrollHeight;
    for (const msg of (data || []).reverse()) {
      if (!document.querySelector(`[data-msg-id="${msg.id}"]`)) renderMessage(msg, container, prepend);
    }
    if (prepend && data && data.length > 0) container.scrollTop = container.scrollHeight - scrollHeight;
    else if (!prepend) container.scrollTop = container.scrollHeight;
    messageOffset += MESSAGE_LIMIT;
  } catch (err) { console.error('Load messages error:', err); }
  finally { loadMoreDiv.remove(); isLoadingMore = false; }
}

async function markMessagesAsRead(partnerId) {
  try {
    await supabase.from('messages').update({ read_at: new Date().toISOString() })
      .eq('sender_id', partnerId).eq('receiver_id', currentUser.id).is('read_at', null);
  } catch (err) { console.error('Mark read error:', err); }
}

      <button class="icon-btn emoji-btn" id="emoji-btn" title="إيموجي"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
      <div class="chat-input-wrapper"><input type="text" id="message-input" placeholder="اكتب رسالة..." autocomplete="off"></div>
      <button class="send-btn" id="send-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>`;
  document.getElementById('back-btn')?.addEventListener('click', () => { chatArea.classList.remove('active'); currentGroupId = null; currentChatType = null; });
  if (window.innerWidth <= 768) chatArea.classList.add('active');
  const messagesContainer = document.getElementById('chat-messages');
  await loadMoreMessages(messagesContainer, groupId, 'group');
  messagesContainer.addEventListener('scroll', async () => {
    if (messagesContainer.scrollTop < 50 && !isLoadingMore && !allMessagesLoaded) {
      await loadMoreMessages(messagesContainer, groupId, 'group', true);
    }
  });
  const sendBtn = document.getElementById('send-btn');
  const input = document.getElementById('message-input');
  const sendMessage = async () => {
    const content = input.value.trim();
    if (!content) return;
    input.value = ''; input.focus();
    const tempId = 'temp-' + Date.now();
    const tempMsg = { id: null, sender_id: currentUser.id, content, created_at: new Date().toISOString(), tempId, edited_at: null, deleted: false };
    renderMessage(tempMsg, messagesContainer);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    try {
      const { data, error } = await supabase.from('group_messages').insert({ group_id: groupId, sender_id: currentUser.id, content }).select().single();
      if (error) { alert('فشل إرسال الرسالة: ' + classifyError(error).msg); return; }

      if (tempEl) { tempEl.dataset.msgId = data.id; delete tempEl.dataset.tempId; }
      updateConversationPreview(groupId, 'group', content, new Date());
    } catch (err) { alert('فشل إرسال الرسالة: ' + classifyError(err).msg); }
  };

  // Emoji picker

    span.addEventListener('click', () => { input.value += emoji; emojiPicker.classList.remove('active'); input.focus(); });

  if (chatRealtimeChannel) supabase.removeChannel(chatRealtimeChannel);
  chatRealtimeChannel = supabase
    .channel(`group-${groupId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'group_messages' }, (payload) => {
      const msg = payload.new;
      if (msg.group_id !== groupId) return;
      if (document.querySelector(`[data-msg-id="${msg.id}"]`)) return;
      renderMessage(msg, messagesContainer);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      if (msg.sender_id !== currentUser.id) {
        updateConversationPreview(groupId, 'group', msg.content, msg.created_at);
        showNotification(group.name, msg.content, 'م');
      }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'group_messages' }, (payload) => {
      const msg = payload.new;
      const el = document.querySelector(`[data-msg-id="${msg.id}"]`);
      if (el) {
        const contentDiv = el.querySelector('.msg-content');
        if (contentDiv) { contentDiv.textContent = msg.deleted ? 'تم حذف هذه الرسالة' : msg.content; if (msg.deleted) el.classList.add('deleted'); }
        const editedSpan = el.querySelector('.message-edited');
        if (editedSpan && msg.edited_at) editedSpan.style.display = 'inline';
      }
    })
    .subscribe();
}

// Render Message
function renderMessage(msg, container, prepend = false) {
  if (msg.id && document.querySelector(`[data-msg-id="${msg.id}"]`)) return;
  if (msg.tempId && document.querySelector(`[data-temp-id="${msg.tempId}"]`)) return;
  const isSent = msg.sender_id === currentUser.id;
  const isDeleted = msg.deleted;
  const isEdited = !!msg.edited_at;
  const isRead = !!msg.read_at;
  // Date divider
  const msgDate = new Date(msg.created_at).toDateString();
  if (msgDate !== lastDateDivider) {
    lastDateDivider = msgDate;
    const divider = document.createElement('div');
    divider.className = 'date-divider';
    divider.innerHTML = `<span>${formatDateDivider(msg.created_at)}</span>`;
    if (prepend) container.insertBefore(divider, container.firstChild);
    else container.appendChild(divider);
  }
  const row = document.createElement('div');
  row.className = `message-row ${isSent ? 'sent' : 'received'}`;
  const div = document.createElement('div');
  div.className = `message-bubble ${isSent ? 'sent' : 'received'} ${isDeleted ? 'deleted' : ''}`;
  div.innerHTML = `
    <div class="msg-content">${escapeHtml(isDeleted ? 'تم حذف هذه الرسالة' : msg.content)}</div>
    <div class="message-meta">
      <span class="message-time">${formatMessageTime(msg.created_at)}</span>
      ${isEdited ? '<span class="message-edited" style="display:inline;">تم التعديل</span>' : '<span class="message-edited" style="display:none;">تم التعديل</span>'}
      ${isSent ? `<span class="message-check ${isRead ? 'read' : ''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></span>` : ''}
    </div>`;
  if (msg.id) div.dataset.msgId = msg.id;
  if (msg.tempId) div.dataset.tempId = msg.tempId;
  if (isSent && !isDeleted) {
    div.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenu(e, msg.id, msg.content, msg.group_id ? 'group' : 'direct'); });
    div.addEventListener('click', (e) => { if (e.detail === 2) showContextMenu(e, msg.id, msg.content, msg.group_id ? 'group' : 'direct'); });
  }
  row.appendChild(div);
  if (prepend) container.insertBefore(row, container.firstChild);
  else container.appendChild(row);
}

// Global Realtime
function setupGlobalRealtime() {
  if (globalRealtimeChannel) supabase.removeChannel(globalRealtimeChannel);
  globalRealtimeChannel = supabase
    .channel('global-' + currentUser.id)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
      const msg = payload.new;
      if (msg.receiver_id !== currentUser.id) return;
      const partnerId = msg.sender_id;
      if (conversationMap.has(`direct-${partnerId}`)) {
        updateConversationPreview(partnerId, 'direct', msg.content, msg.created_at);
      } else {
        try {
          const { data: profile } = await supabase.from('profiles').select('*').eq('id', partnerId).single();
          if (profile) renderConversation(partnerId, profile, msg, 'direct', true);
        } catch (err) { console.error('Profile fetch error:', err); }
      }
      if (partnerId !== currentPartnerId) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', partnerId).single();
        showNotification(profile?.display_name || profile?.username || 'رسالة جديدة', msg.content, (profile?.display_name || 'م')[0]);
      }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'group_messages' }, async (payload) => {
      const msg = payload.new;
      if (msg.sender_id === currentUser.id) return;
      const { data: member } = await supabase.from('group_members').select('*').eq('group_id', msg.group_id).eq('user_id', currentUser.id).single();
      if (!member) return;
      if (conversationMap.has(`group-${msg.group_id}`)) {
        updateConversationPreview(msg.group_id, 'group', msg.content, msg.created_at);
      } else {
        const { data: group } = await supabase.from('groups').select('*').eq('id', msg.group_id).single();
        if (group) renderConversation(msg.group_id, group, msg, 'group', true);
      }
      if (msg.group_id !== currentGroupId) {
        const { data: group } = await supabase.from('groups').select('*').eq('id', msg.group_id).single();
        showNotification(group?.name || 'مجموعة', msg.content, 'م');
      }
    })
    .subscribe();
}

async function searchAndAddContact() {
  const query = document.getElementById('add-contact-input').value.trim();
  if (!query) return;
  const btn = document.getElementById('add-contact-search-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0 auto;"></div>';
  document.getElementById('add-contact-error').style.display = 'none';
  document.getElementById('add-contact-results').innerHTML = '';
  try {
    let data;
    if (query.startsWith('+') || /^[0-9]/.test(query)) {
      const { data: byPhone } = await supabase.from('profiles').select('*').ilike('phone', `%${query}%`).neq('id', currentUser.id).limit(10);
      data = byPhone;
    } else {
      const { data: byName } = await supabase.from('profiles').select('*').ilike('username', `%${query}%`).neq('id', currentUser.id).limit(10);
      data = byName;
    }
    btn.disabled = false; btn.textContent = 'بحث';
    if (!data || data.length === 0) { document.getElementById('add-contact-error').textContent = 'لم يتم العثور على مستخدمين'; document.getElementById('add-contact-error').style.display = 'block'; return; }
    for (const profile of data) {
      const avatarLetter = (profile.display_name || profile.username || 'م')[0].toUpperCase();
      const avatarHtml = profile.avatar_url ? `<img src="${escapeHtml(profile.avatar_url)}" alt="">` : escapeHtml(avatarLetter);
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = `<div class="avatar avatar-sm">${avatarHtml}</div><div><div class="name">${escapeHtml(profile.display_name || profile.username)}</div><div class="handle">@${profile.username} | ${profile.phone || ''}</div></div>`;
      div.addEventListener('click', async () => {
        try {
          await supabase.from('contacts').insert({ user_id: currentUser.id, contact_id: profile.id, phone: profile.phone, display_name: profile.display_name });
          await supabase.from('follows').insert({ follower_id: currentUser.id, following_id: profile.id }).catch(() => {});
          showNotification('تمت الإضافة', `تمت إضافة ${profile.display_name || profile.username} لجهات الاتصال`, avatarLetter);
          addContactModal.classList.remove('active');
          if (!conversationMap.has(`direct-${profile.id}`)) {
            renderConversation(profile.id, profile, { content: 'ابدأ المحادثة...', created_at: new Date().toISOString() }, 'direct', true);
          }
        } catch (err) { document.getElementById('add-contact-error').textContent = classifyError(err).msg; document.getElementById('add-contact-error').style.display = 'block'; }
      });
      document.getElementById('add-contact-results').appendChild(div);
    }
  } catch (err) {
    btn.disabled = false; btn.textContent = 'بحث';
    document.getElementById('add-contact-error').textContent = classifyError(err).msg;
    document.getElementById('add-contact-error').style.display = 'block';
  }
}

// Polling (Optimized)
function startPolling() {
  pollIntervals.forEach(clearInterval);
  pollIntervals = [];
  const convPoll = setInterval(async () => {
    if (!currentUser) return;
    try {
      const { data: msgs } = await supabase.from('messages').select('sender_id, receiver_id, content, created_at')
        .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`).eq('deleted', false).order('created_at', { ascending: false }).limit(50);
      const partnerMap = new Map();
      for (const msg of msgs || []) {
        const partnerId = msg.sender_id === currentUser.id ? msg.receiver_id : msg.sender_id;
        if (!partnerMap.has(partnerId)) partnerMap.set(partnerId, msg);
      }
      for (const [partnerId, lastMsg] of partnerMap) {
        if (conversationMap.has(`direct-${partnerId}`)) updateConversationPreview(partnerId, 'direct', lastMsg.content, lastMsg.created_at);
      }
    } catch (err) { console.error('Conv poll error:', err); }
  }, 15000);
  pollIntervals.push(convPoll);
}
